  <!-- Google Translate: restore saved language -->
  <script>
    (function(){
      var lang = localStorage.getItem('nt-lang');
      if(lang && lang !== 'en'){
        // Inject the cookie Google Translate reads on load
        document.cookie = 'googtrans=/en/' + lang + '; path=/';

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  initTheme();

  function showError(msg)   { const b=document.getElementById('errorBox');   b.textContent=msg; b.style.display='block'; document.getElementById('successBox').style.display='none'; }
  function showSuccess(msg) { const b=document.getElementById('successBox'); b.textContent=msg; b.style.display='block'; document.getElementById('errorBox').style.display='none'; }

  async function doSignup() {
    const name    = document.getElementById('fullName').value.trim();
    const email   = document.getElementById('email').value.trim();
    const pass    = document.getElementById('password').value;
    const conf    = document.getElementById('confirmPass').value;
    const phone   = document.getElementById('phoneNumber').value.trim();
    const country = document.getElementById('country').value;

    if (!name||!email||!pass||!conf) return showError('Please fill in all fields.');
    if (!phone)                      return showError('Please enter your phone number.');
    if (!country)                    return showError('Please select your country.');
    if (pass.length < 6)             return showError('Password must be at least 6 characters.');
    if (pass !== conf)               return showError('Passwords do not match.');

    document.getElementById('loadingOverlay').style.display='flex';
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      const uid  = cred.user.uid;

      // Generate account ID — if Firestore rules block the collision-check query
      // before the user doc exists, fall back to a locally-generated ID instead.
      let acctId;
      try {
        acctId = await generateAccountId();
      } catch(idErr) {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let rand = '';
        for (let i = 0; i < 8; i++) rand += chars.charAt(Math.floor(Math.random() * chars.length));
        acctId = 'NXT-' + rand;
      }

      await db.collection('users').doc(uid).set({
        fullName:    name,
        email:       email,
        phone:       phone,
        country:     country,
        accountId:   acctId,
        balance:     0,
        equity:      0,
        createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
        status:      'active',
        isAdmin:     false,
      });

      document.getElementById('loadingOverlay').style.display='none';
      showSuccess('Account created! Setting up verification...');
      setTimeout(() => window.location.href='kyc.html', 1200);
    } catch(e) {
      document.getElementById('loadingOverlay').style.display='none';
      const msg =
        e.code === 'auth/email-already-in-use' ? 'This email is already registered. Please sign in instead.' :
        e.code === 'auth/weak-password'         ? 'Password is too weak. Use at least 6 characters.' :
        e.code === 'auth/invalid-email'         ? 'Please enter a valid email address.' :
        e.code === 'auth/network-request-failed'? 'Network error. Check your connection and try again.' :
        'Signup failed: ' + e.message;
      showError(msg);
    }
  }
</script>

<!-- Google Translate: widget init & language persistence -->
<div id="google_translate_element" style="display:none;"></div>
<script>
  function ntInitGT(){
    new google.translate.TranslateElement({
      pageLanguage:'en',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
    }, 'google_translate_element');

    // Watch for language changes and save to localStorage
    function ntWatchLang(){
      var sel = document.querySelector('.goog-te-combo');
      if(sel){
        sel.addEventListener('change', function(){
          localStorage.setItem('nt-lang', sel.value);
          document.cookie = 'googtrans=/en/' + sel.value + '; path=/';
        });
        // Apply saved language on load
        var saved = localStorage.getItem('nt-lang');
        if(saved && saved !== 'en' && sel.value !== saved){
          sel.value = saved;
          sel.dispatchEvent(new Event('change'));
        }
      } else {
        setTimeout(ntWatchLang, 300);
      }
    }
    ntWatchLang();

    // Move widget into the nav slot once ready
    function ntMountWidget(){
      var wrap = document.getElementById('nt-translate-wrap');
      var gadget = document.querySelector('.goog-te-gadget');
      if(wrap && gadget){ wrap.appendChild(gadget); }
      else { setTimeout(ntMountWidget, 300); }
    }
    ntMountWidget();
  }
</script>
</body>
