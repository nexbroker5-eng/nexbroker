<script src="firebase-config.js"></script>
<script>
  initTheme();
  let allTrades=[],prices={};
  requireAuth(async user=>{
    const uSnap=await db.collection('users').doc(user.uid).get();const ud=uSnap.data();
    document.getElementById('sidebarName').textContent=ud.fullName||'Trader';
    document.getElementById('sidebarUid').textContent=ud.accountId||'—';
    document.getElementById('sidebarAvatar').textContent=(ud.fullName||'T')[0];
    try{const s=await db.collection('prices').get();s.forEach(d=>{const data=d.data();const sym=data.symbol||d.id.replace('-','/');if(data.price)prices[sym]=data.price;});}catch(e){}
    try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple,solana,binancecoin,cardano,avalanche-2&vs_currencies=usd');if(r.ok){const d=await r.json();if(d.bitcoin)prices['BTC/USD']=d.bitcoin.usd;if(d.ethereum)prices['ETH/USD']=d.ethereum.usd;if(d.ripple)prices['XRP/USD']=d.ripple.usd;if(d.solana)prices['SOL/USD']=d.solana.usd;if(d.binancecoin)prices['BNB/USD']=d.binancecoin.usd;if(d.cardano)prices['ADA/USD']=d.cardano.usd;if(d['avalanche-2'])prices['AVAX/USD']=d['avalanche-2'].usd;}}catch(e){}
    ALL_INSTRUMENTS.forEach(i=>{if(!prices[i.symbol])prices[i.symbol]=i.defaultPrice;});
    const tSnap=await db.collection('trades').where('userId','==',user.uid).get();
    allTrades=tSnap.docs.map(d=>{return{id:d.id,...d.data()}});
    const syms=[...new Set(allTrades.map(t=>t.symbol))];
    const sel=document.getElementById('filterSymbol');
    syms.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
    calcStats();document.getElementById('histStats').style.display='grid';applyFilter();
  });
  function calcStats(){const cl=allTrades.filter(t=>t.status==='closed');const tp=cl.reduce((s,t)=>s+(t.profitLoss||0),0);const w=cl.filter(t=>(t.profitLoss||0)>0).length;const l=cl.filter(t=>(t.profitLoss||0)<0).length;document.getElementById('hTotal').textContent=allTrades.length;const el=document.getElementById('hPnl');el.textContent=fmtCurrency(tp);el.className='stat-card__value mono '+(tp>=0?'pnl-positive':'pnl-negative');document.getElementById('hWins').textContent=w;document.getElementById('hLoss').textContent=l;}
  function applyFilter(){const st=document.getElementById('filterStatus').value;const sy=document.getElementById('filterSymbol').value;const ty=document.getElementById('filterType').value;let f=allTrades.filter(t=>(!st||t.status===st)&&(!sy||t.symbol===sy)&&(!ty||t.type===ty));f.sort((a,b)=>(b.openedAt?.seconds||0)-(a.openedAt?.seconds||0));const tbody=document.getElementById('tradeBody');if(!f.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--text-muted);">No trades found.</td></tr>';return;}tbody.innerHTML=f.map(t=>{const io=t.status==='open';const c=prices[t.symbol]||t.entryPrice;const pnl=io?calcPnL(t,c):(t.profitLoss||0);const pc=pnl>=0?'pnl-positive':'pnl-negative';return`<tr><td><strong>${t.symbol}</strong></td><td><span class="badge badge-${t.type.toLowerCase()}">${t.type}</span></td><td class="td-mono">${t.lotSize}</td><td class="td-mono">${fmtPrice(t.entryPrice,t.symbol)}</td><td class="td-mono">${io?fmtPrice(c,t.symbol):(t.exitPrice?fmtPrice(t.exitPrice,t.symbol):'—')}</td><td class="${pc}">${fmtCurrency(pnl)}</td><td><span class="badge ${io?'badge-info':'badge-neutral'}">${t.status}</span></td><td style="font-size:.76rem;color:var(--text-muted);">${fmtDate(t.openedAt)}</td><td style="font-size:.76rem;color:var(--text-muted);">${t.closedAt?fmtDate(t.closedAt):'—'}</td></tr>`;}).join('');}
</script>

<div id="google_translate_element" style="display:none;"></div>
<script>
  function ntInitGT(){
    new google.translate.TranslateElement({
      pageLanguage:'en',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
    }, 'google_translate_element');

    // Watch for language changes and save to localStorage
    function ntWatchLang(){
      var sel = document.querySelector('.goog-te-combo');
      if(sel){
        sel.addEventListener('change', function(){
          localStorage.setItem('nt-lang', sel.value);
          document.cookie = 'googtrans=/en/' + sel.value + '; path=/';
        });
        // Apply saved language on load
        var saved = localStorage.getItem('nt-lang');
        if(saved && saved !== 'en' && sel.value !== saved){
          sel.value = saved;
          sel.dispatchEvent(new Event('change'));
        }
      } else {
        setTimeout(ntWatchLang, 300);
      }
    }
    ntWatchLang();

    // Move widget into the nav slot once ready
    function ntMountWidget(){
      var wrap = document.getElementById('nt-translate-wrap');
      var gadget = document.querySelector('.goog-te-gadget');
      if(wrap && gadget){ wrap.appendChild(gadget); }
      else { setTimeout(ntMountWidget, 300); }
    }
    ntMountWidget();
  }
</script>
